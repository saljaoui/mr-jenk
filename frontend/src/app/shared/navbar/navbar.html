<nav class="navbar-buy">
  <div class="container">
    <div class="nav-inner">
      <a class="nav-brand" routerLink="/products">
        <img class="brand-logo" src="/logo.png" alt="Buy01 logo" />
      </a>

      <div class="nav-search">
        <i class="bi bi-search s-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <g fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11.5" cy="11.5" r="9.5" />
              <path stroke-linecap="round" d="m20 20l2 2" />
            </g>
          </svg>
        </i>
        <input type="text" placeholder="Search products, brands, or categories" />
      </div>

      <div class="nav-actions">
        @if (currentUser; as user) {
        <div class="nav-profile">
          <div class="nav-avatar">
            @if (user.avatar) {
            <img [src]="user.avatar" [alt]="user.name" />
            } @else {
            <span>{{ userInitials }}</span>
            }
          </div>
          <div class="nav-profile-copy">
            <strong>{{ user.name }}</strong>
            <small>{{ profileLabel }}</small>
          </div>
        </div>

        @if (sellerDashboardLink; as dashboardLink) {
        <a [routerLink]="dashboardLink" class="nav-btn hide-mobile">
          <i class="bi bi-grid-1x2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
              <g fill="none" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" d="M14.5 6.5h3m0 0h3m-3 0v3m0-3v-3" />
                <path
                  d="M2.5 6.5c0-1.886 0-2.828.586-3.414C3.672 2.5 4.614 2.5 6.5 2.5c1.886 0 2.828 0 3.414.586c.586.586.586 1.528.586 3.414c0 1.886 0 2.828-.586 3.414c-.586.586-1.528.586-3.414.586c-1.886 0-2.828 0-3.414-.586C2.5 9.328 2.5 8.386 2.5 6.5Zm11 11c0-1.886 0-2.828.586-3.414c.586-.586 1.528-.586 3.414-.586c1.886 0 2.828 0 3.414.586c.586.586.586 1.528.586 3.414c0 1.886 0 2.828-.586 3.414c-.586.586-1.528.586-3.414.586c-1.886 0-2.828 0-3.414-.586c-.586-.586-.586-1.528-.586-3.414Zm-11 0c0-1.886 0-2.828.586-3.414c.586-.586 1.528-.586 3.414-.586c1.886 0 2.828 0 3.414.586c.586.586.586 1.528.586 3.414c0 1.886 0 2.828-.586 3.414c-.586.586-1.528.586-3.414.586c-1.886 0-2.828 0-3.414-.586C2.5 20.328 2.5 19.386 2.5 17.5Z" />
              </g>
            </svg>
          </i>
          Dashboard
        </a>
        }

        <button type="button" class="nav-btn logout" (click)="logout()">
          <i class="bi bi-box-arrow-right">
            <svg width="24" height="24" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="1.5">
                <path d="M12 20a8 8 0 1 1 0-16" />
                <path stroke-linejoin="round" d="M10 12h10m0 0l-3-3m3 3l-3 3" />
              </g>
            </svg>
          </i>
          <span class="hide-mobile">Sign Out</span>
        </button>
        } @else {
        <a routerLink="/login" class="nav-btn hide-mobile">Sign In</a>
        <a routerLink="/register" class="nav-btn primary hide-mobile">
          <app-icon name="user-plus" [size]="16"></app-icon>
          Register
        </a>
        }

        <button class="cart-btn" type="button" aria-label="Open cart">
          <i class="bi bi-bag">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
              <g fill="none" stroke="currentColor" stroke-width="1.5">
                <path
                  d="M2 12c0-4.714 0-7.071 1.464-8.536C4.93 2 7.286 2 12 2c4.714 0 7.071 0 8.535 1.464C22 4.93 22 7.286 22 12c0 4.714 0 7.071-1.465 8.535C19.072 22 16.714 22 12 22s-7.071 0-8.536-1.465C2 19.072 2 16.714 2 12Z" />
                <path stroke-linecap="round"
                  d="M2 13h3.16c.905 0 1.358 0 1.756.183c.398.183.692.527 1.281 1.214l.606.706c.589.687.883 1.031 1.281 1.214c.398.183.85.183 1.756.183h.32c.905 0 1.358 0 1.756-.183c.398-.183.692-.527 1.281-1.214l.606-.706c.589-.687.883-1.031 1.281-1.214c.398-.183.85-.183 1.756-.183H22" />
              </g>
            </svg>
          </i>
          <span class="cart-badge">3</span>
        </button>
      </div>
    </div>
  </div>
</nav>
